version: "1.0"
workspace_root: "./demo/demo_workspace"

transport:
  type: http
  host: "127.0.0.1"
  port: 8080
  request_timeout_seconds: 30

routing_endpoints:
  read_file:
    url: "http://127.0.0.1:3001"
    method: "POST"
    path: "/read"
  write_file:
    url: "http://127.0.0.1:3001"
    method: "POST"
    path: "/write"

redaction_patterns:
  - "ghp_[A-Za-z0-9]{20,}"

agent_permissions:
  admin_agent:
    - read_file
    - write_file
  guest_agent:
    - read_file

allowed_tools:
  read_file:
    arguments:
      file_path: string
    path_fields:
      - file_path
  write_file:
    arguments:
      file_path: string
      content: string
    path_fields:
      - file_path
